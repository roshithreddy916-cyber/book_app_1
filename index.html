x<!DOCTYPE html>
<html>
<head>
    <title>Online Book Store</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f2f2f2;
        }
        .book {
            border: 1px solid #ccc;
            padding: 15px;
            margin: 15px;
            display: inline-block;
            background-color: white;
            width: 200px;
        }
        button {
            padding: 10px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: darkgreen;
        }
    </style>
</head>

<body>

<h1>📚 Online Book Store</h1>

<div class="book">
    <h3>Java Programming</h3>
    <p>Price: ₹500</p>
    <button onclick="buyBook('Java Programming')">Buy Now</button>
</div>

<div class="book">
    <h3>Python Basics</h3>
    <p>Price: ₹400</p>
    <button onclick="buyBook('Python Basics')">Buy not  Now</button>
</div>

<div class="book">
    <h3>Web Development</h3>
    <p>Price: ₹600</p>
    <button onclick="buyBook('Web Development')">Buy Now</button>
</div>

<script>
function buyBook(bookName) {
    alert("You selected: " + bookName);
}
</script>

</body>
</html>
